services:
  proton-drive-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ghcr.io/robje007/proton-drive-sync:latest
    container_name: proton-drive-sync
    restart: unless-stopped

    environment:
      - KEYRING_PASSWORD=${KEYRING_PASSWORD}
      - TZ=${TZ:-UTC}
      # Secure dashboard sign-in is opt-in. Outside localhost, put the dashboard
      # behind an HTTPS reverse proxy before enabling WEB_AUTH_TRUST_PROXY.
      # - WEB_AUTH_ENABLED=1
      # - WEB_AUTH_ACCESS_TOKEN=${WEB_AUTH_ACCESS_TOKEN}
      # - WEB_AUTH_TRUST_PROXY=1
      # Optional: headless authentication (does not support 2FA accounts)
      # - PROTON_USERNAME=${PROTON_USERNAME}
      # - PROTON_PASSWORD=${PROTON_PASSWORD}

    volumes:
      # Persistent config (credentials.enc, config.json)
      - config:/config/proton-drive-sync
      # Persistent state (state.db, sync.log)
      - state:/state/proton-drive-sync
      # Host directory mount points - set SYNC_DIR_* in .env to enable
      # - ${SYNC_DIR_1}:/data/documents
      # - ${SYNC_DIR_2}:/data/photos

    ports:
      - '${DASHBOARD_PORT:-4242}:4242'

    # Allow graceful shutdown
    stop_grace_period: 30s

volumes:
  config:
  state:
